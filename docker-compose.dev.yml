services:
  postgres:
    image: postgres:16-alpine
    container_name: blogger-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PG_DATABASE_NAME}
      POSTGRES_USER: ${PG_DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${PG_DATABASE_PASS}
    ports:
      - "${PG_DATABASE_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_DATABASE_USERNAME} -d ${PG_DATABASE_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blogger-platform-app-dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.development
    environment:
      NODE_ENV: development
      PG_DATABASE_HOST: postgres
    ports:
      - "3000:3000"
    volumes:
      - ./:/usr/src/app
      - /usr/src/app/node_modules
    command: ["npm", "run", "docker:dev"]

volumes:
  pg_data:
